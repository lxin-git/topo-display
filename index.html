<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topology Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* Carbon Design System - Design Tokens */
        :root {
            /* Colors - IBM Carbon Theme (White/g10) */
            --cds-background: #ffffff;
            --cds-layer-01: #f4f4f4;
            --cds-layer-02: #ffffff;
            --cds-layer-03: #f4f4f4;
            --cds-field-01: #f4f4f4;
            --cds-field-02: #ffffff;
            --cds-ui-background: #f4f4f4;
            --cds-interactive: #0f62fe;
            --cds-interactive-hover: #0353e9;
            --cds-interactive-active: #002d9c;
            --cds-text-primary: #161616;
            --cds-text-secondary: #525252;
            --cds-text-placeholder: #a8a8a8;
            --cds-text-on-color: #ffffff;
            --cds-link-primary: #0f62fe;
            --cds-link-primary-hover: #0043ce;
            --cds-border-subtle: #e0e0e0;
            --cds-border-strong: #8d8d8d;
            --cds-border-interactive: #0f62fe;
            --cds-focus: #0f62fe;
            --cds-support-error: #da1e28;
            --cds-support-success: #24a148;
            --cds-support-warning: #f1c21b;
            --cds-support-info: #0043ce;
            
            /* Spacing - Carbon 8px grid */
            --cds-spacing-01: 0.125rem;  /* 2px */
            --cds-spacing-02: 0.25rem;   /* 4px */
            --cds-spacing-03: 0.5rem;    /* 8px */
            --cds-spacing-04: 0.75rem;   /* 12px */
            --cds-spacing-05: 1rem;      /* 16px */
            --cds-spacing-06: 1.5rem;    /* 24px */
            --cds-spacing-07: 2rem;      /* 32px */
            --cds-spacing-08: 2.5rem;    /* 40px */
            --cds-spacing-09: 3rem;      /* 48px */
            --cds-spacing-10: 4rem;      /* 64px */
            
            /* Typography */
            --cds-font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
            --cds-font-family-mono: 'IBM Plex Mono', 'Menlo', 'DejaVu Sans Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--cds-font-family);
            background: var(--cds-ui-background);
            min-height: 100vh;
            color: var(--cds-text-primary);
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 100%;
            width: 100%;
            margin: 0;
            background: var(--cds-background);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .main-content {
            display: flex;
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        /* JSON Panel */
        .json-panel {
            width: 400px;
            min-width: 250px;
            max-width: 800px;
            background: var(--cds-layer-01);
            border-right: 1px solid var(--cds-border-subtle);
            display: none;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }

        .json-panel.show {
            display: flex;
        }

        .json-panel-header {
            padding: var(--cds-spacing-05);
            background: var(--cds-layer-02);
            border-bottom: 1px solid var(--cds-border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .json-panel-header h3 {
            margin: 0;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--cds-text-primary);
        }

        .json-panel-close {
            background: transparent;
            border: none;
            color: var(--cds-text-primary);
            font-size: 1.25rem;
            cursor: pointer;
            padding: var(--cds-spacing-02);
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 110ms;
        }

        .json-panel-close:hover {
            background: var(--cds-layer-01);
        }

        .json-panel-close:focus {
            outline: 2px solid var(--cds-focus);
            outline-offset: -2px;
        }

        .json-panel-content {
            flex: 1;
            overflow: auto;
            padding: var(--cds-spacing-05);
            min-height: 0;
        }

        .json-display {
            background: var(--cds-layer-02);
            color: var(--cds-text-primary);
            padding: var(--cds-spacing-05);
            border: 1px solid var(--cds-border-subtle);
            font-family: var(--cds-font-family-mono);
            font-size: 0.75rem;
            line-height: 1.5;
            overflow-x: auto;
            white-space: pre;
            word-wrap: break-word;
            min-width: 0;
        }

        .resize-handle {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            cursor: ew-resize;
            background: transparent;
            z-index: 10;
        }

        .resize-handle:hover,
        .resize-handle.resizing {
            background: var(--cds-border-interactive);
        }

        .visualization-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* Header */
        .header {
            background: var(--cds-layer-02);
            border-bottom: 1px solid var(--cds-border-subtle);
            padding: var(--cds-spacing-07) var(--cds-spacing-06);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: var(--cds-spacing-03);
            color: var(--cds-text-primary);
        }

        .header p {
            font-size: 0.875rem;
            color: var(--cds-text-secondary);
        }

        /* Controls */
        .controls {
            padding: var(--cds-spacing-05) var(--cds-spacing-06);
            background: var(--cds-layer-01);
            border-bottom: 1px solid var(--cds-border-subtle);
            display: flex;
            gap: var(--cds-spacing-05);
            flex-wrap: wrap;
            align-items: center;
        }

        /* File Input */
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 var(--cds-spacing-05);
            height: 3rem;
            background: var(--cds-interactive);
            color: var(--cds-text-on-color);
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 400;
            transition: background 110ms;
            outline: 2px solid transparent;
            outline-offset: -2px;
        }

        .file-input-label:hover {
            background: var(--cds-interactive-hover);
        }

        .file-input-label:focus {
            outline: 2px solid var(--cds-focus);
            outline-offset: -2px;
        }

        /* Buttons - Carbon Style */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 var(--cds-spacing-05);
            height: 3rem;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 400;
            transition: background 110ms;
            outline: 2px solid transparent;
            outline-offset: -2px;
            font-family: var(--cds-font-family);
        }

        .btn-primary {
            background: var(--cds-interactive);
            color: var(--cds-text-on-color);
        }

        .btn-primary:hover {
            background: var(--cds-interactive-hover);
        }

        .btn-primary:focus {
            outline: 2px solid var(--cds-focus);
            outline-offset: -2px;
        }

        .btn-secondary {
            background: transparent;
            color: var(--cds-text-primary);
            border: 1px solid var(--cds-interactive);
        }

        .btn-secondary:hover {
            background: var(--cds-interactive-hover);
            color: var(--cds-text-on-color);
        }

        .btn-secondary:focus {
            outline: 2px solid var(--cds-focus);
            outline-offset: -2px;
        }

        /* Stats */
        .stats {
            display: flex;
            gap: var(--cds-spacing-06);
            margin-left: auto;
            flex-wrap: wrap;
        }

        .stat-item {
            background: var(--cds-layer-02);
            padding: var(--cds-spacing-04) var(--cds-spacing-05);
            border: 1px solid var(--cds-border-subtle);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--cds-text-secondary);
            margin-bottom: var(--cds-spacing-02);
            text-transform: uppercase;
            letter-spacing: 0.32px;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--cds-text-primary);
        }

        /* Visualization */
        #visualization {
            flex: 1;
            background: var(--cds-background);
            position: relative;
            min-height: 500px;
        }

        .node {
            cursor: pointer;
            transition: all 110ms;
        }

        .node:hover {
            filter: brightness(1.1);
        }

        .node circle {
            stroke: var(--cds-background);
            stroke-width: 2px;
            transition: all 110ms;
        }

        .node.highlighted circle {
            stroke: var(--cds-support-error);
            stroke-width: 3px;
            filter: drop-shadow(0 0 6px var(--cds-support-error));
        }

        .node.dimmed {
            opacity: 0.2;
        }

        .node text {
            font-size: 0.75rem;
            font-family: var(--cds-font-family);
            pointer-events: none;
            fill: var(--cds-text-primary);
        }

        .link {
            stroke: var(--cds-border-strong);
            stroke-opacity: 0.6;
            stroke-width: 1px;
            fill: none;
        }

        .link-label {
            font-size: 0.625rem;
            fill: var(--cds-text-secondary);
            pointer-events: none;
            font-family: var(--cds-font-family);
        }

        /* Tooltip - Carbon Style */
        .tooltip {
            position: absolute;
            padding: var(--cds-spacing-05);
            background: var(--cds-layer-02);
            color: var(--cds-text-primary);
            border: 1px solid var(--cds-border-subtle);
            pointer-events: none;
            opacity: 0;
            transition: opacity 110ms;
            max-width: 300px;
            z-index: 1000;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .tooltip.show {
            opacity: 1;
        }

        .tooltip-title {
            font-weight: 600;
            margin-bottom: var(--cds-spacing-03);
            font-size: 0.875rem;
            border-bottom: 1px solid var(--cds-border-subtle);
            padding-bottom: var(--cds-spacing-03);
        }

        .tooltip-content {
            font-size: 0.75rem;
            line-height: 1.5;
        }

        .tooltip-row {
            margin: var(--cds-spacing-02) 0;
        }

        .tooltip-label {
            color: var(--cds-text-secondary);
            margin-right: var(--cds-spacing-03);
        }

        /* Legend - Carbon Style */
        .legend {
            position: absolute;
            top: var(--cds-spacing-05);
            right: var(--cds-spacing-05);
            background: var(--cds-layer-02);
            border: 1px solid var(--cds-border-subtle);
            max-width: 250px;
            z-index: 100;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .legend-header {
            padding: var(--cds-spacing-04) var(--cds-spacing-05);
            background: var(--cds-layer-01);
            border-bottom: 1px solid var(--cds-border-subtle);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .legend-header:hover {
            background: var(--cds-layer-03);
        }

        .legend-title {
            font-weight: 600;
            font-size: 0.875rem;
            margin: 0;
            color: var(--cds-text-primary);
        }

        .legend-toggle {
            font-size: 1rem;
            transition: transform 110ms;
            color: var(--cds-text-primary);
        }

        .legend-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .legend-content {
            max-height: 400px;
            overflow-y: auto;
            padding: var(--cds-spacing-05);
            display: none;
        }

        .legend-content.show {
            display: block;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: var(--cds-spacing-03) 0;
            font-size: 0.75rem;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: var(--cds-spacing-03);
            border: 1px solid var(--cds-border-subtle);
            flex-shrink: 0;
        }

        .legend-label {
            word-break: break-word;
            color: var(--cds-text-primary);
        }

        /* Search Box - Carbon Style */
        .search-box {
            flex: 1;
            min-width: 250px;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 0 var(--cds-spacing-05);
            height: 3rem;
            border: none;
            border-bottom: 1px solid var(--cds-border-strong);
            background: var(--cds-field-01);
            font-size: 0.875rem;
            font-family: var(--cds-font-family);
            color: var(--cds-text-primary);
            transition: all 110ms;
            outline: 2px solid transparent;
            outline-offset: -2px;
        }

        .search-box input::placeholder {
            color: var(--cds-text-placeholder);
        }

        .search-box input:focus {
            outline: 2px solid var(--cds-focus);
            outline-offset: -2px;
        }

        /* Loading - Carbon Style */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--cds-text-primary);
        }

        .loading-spinner {
            border: 3px solid var(--cds-border-subtle);
            border-top: 3px solid var(--cds-interactive);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 0 auto var(--cds-spacing-05);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error Message - Carbon Style */
        .error-message {
            background: var(--cds-support-error);
            color: var(--cds-text-on-color);
            padding: var(--cds-spacing-05);
            margin: var(--cds-spacing-05);
            border-left: 3px solid #750e13;
        }

        /* Zoom Controls - Carbon Style */
        .zoom-controls {
            position: absolute;
            bottom: var(--cds-spacing-05);
            right: var(--cds-spacing-05);
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: var(--cds-border-subtle);
        }

        .zoom-btn {
            width: 2.5rem;
            height: 2.5rem;
            background: var(--cds-layer-02);
            border: none;
            color: var(--cds-text-primary);
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 110ms;
            outline: 2px solid transparent;
            outline-offset: -2px;
        }

        .zoom-btn:hover {
            background: var(--cds-layer-01);
        }

        .zoom-btn:focus {
            outline: 2px solid var(--cds-focus);
            outline-offset: -2px;
        }

        .zoom-btn:first-child {
            border-top: 1px solid var(--cds-border-subtle);
        }

        .zoom-btn:last-child {
            border-bottom: 1px solid var(--cds-border-subtle);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Topology Visualization</h1>
            <p>Interactive network topology viewer with node and edge relationships</p>
        </div>

        <div class="controls">
            <div class="file-input-wrapper">
                <input type="file" id="fileInput" accept=".json">
                <label for="fileInput" class="file-input-label">
                    Load JSON File
                </label>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search nodes...">
            </div>

            <button id="showJsonBtn" class="btn btn-primary">Show JSON Data</button>
            <button id="resetBtn" class="btn btn-primary">Reset View</button>
            <button id="clearBtn" class="btn btn-secondary">Clear</button>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">Nodes</div>
                    <div id="nodeCount" class="stat-value">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Edges</div>
                    <div id="edgeCount" class="stat-value">0</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div id="jsonPanel" class="json-panel">
                <div class="json-panel-header">
                    <h3>JSON Data</h3>
                    <button id="closeJsonBtn" class="json-panel-close">×</button>
                </div>
                <div class="json-panel-content">
                    <div id="jsonDisplay" class="json-display"></div>
                </div>
                <div id="resizeHandle" class="resize-handle"></div>
            </div>

            <div class="visualization-container">
                <div id="visualization">
                    <div id="loading" class="loading" style="display: none;">
                        <div class="loading-spinner"></div>
                        <div>Loading topology data...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class TopologyVisualization {
            constructor() {
                this.data = null;
                this.svg = null;
                this.simulation = null;
                this.colorScale = d3.scaleOrdinal(d3.schemeCategory10);
                this.zoom = null;
                this.g = null;
                this.tooltip = null;
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.createTooltip();
                this.setupSVG();
                this.setupResizeHandle();
            }

            setupResizeHandle() {
                const handle = document.getElementById('resizeHandle');
                const panel = document.getElementById('jsonPanel');
                let isResizing = false;

                handle.addEventListener('mousedown', (e) => {
                    isResizing = true;
                    handle.classList.add('resizing');
                    e.preventDefault();
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isResizing) return;

                    const containerRect = document.querySelector('.main-content').getBoundingClientRect();
                    const newWidth = e.clientX - containerRect.left;

                    // Constrain width between min and max
                    const minWidth = 250;
                    const maxWidth = 800;
                    const constrainedWidth = Math.max(minWidth, Math.min(maxWidth, newWidth));

                    panel.style.width = `${constrainedWidth}px`;
                });

                document.addEventListener('mouseup', () => {
                    if (isResizing) {
                        isResizing = false;
                        handle.classList.remove('resizing');
                    }
                });
            }

            setupEventListeners() {
                document.getElementById('fileInput').addEventListener('change', (e) => this.handleFileUpload(e));
                document.getElementById('showJsonBtn').addEventListener('click', () => this.toggleJsonPanel());
                document.getElementById('resetBtn').addEventListener('click', () => this.resetView());
                document.getElementById('searchInput').addEventListener('input', (e) => this.handleSearch(e.target.value));
                document.getElementById('closeJsonBtn').addEventListener('click', () => this.toggleJsonPanel());
                document.getElementById('clearBtn').addEventListener('click', () => this.clear());
            }

            createTooltip() {
                this.tooltip = d3.select('body').append('div')
                    .attr('class', 'tooltip');
            }

            setupSVG() {
                const vizContainer = document.getElementById('visualization');
                const width = vizContainer.clientWidth;
                const height = vizContainer.clientHeight;

                this.svg = d3.select('#visualization')
                    .append('svg')
                    .attr('width', '100%')
                    .attr('height', '100%');

                this.zoom = d3.zoom()
                    .scaleExtent([0.1, 4])
                    .on('zoom', (event) => {
                        this.g.attr('transform', event.transform);
                    });

                this.svg.call(this.zoom);
                this.g = this.svg.append('g');

                this.addZoomControls();
            }

            addZoomControls() {
                const controls = d3.select('#visualization')
                    .append('div')
                    .attr('class', 'zoom-controls');

                controls.append('button')
                    .attr('class', 'zoom-btn')
                    .html('+')
                    .on('click', () => {
                        this.svg.transition().call(this.zoom.scaleBy, 1.3);
                    });

                controls.append('button')
                    .attr('class', 'zoom-btn')
                    .html('−')
                    .on('click', () => {
                        this.svg.transition().call(this.zoom.scaleBy, 0.7);
                    });

                controls.append('button')
                    .attr('class', 'zoom-btn')
                    .html('⟲')
                    .on('click', () => this.resetView());
            }

            async handleFileUpload(event) {
                const file = event.target.files[0];
                if (!file) return;

                document.getElementById('loading').style.display = 'block';

                try {
                    const text = await file.text();
                    const data = JSON.parse(text);

                    if (!data.nodes || !data.edges) {
                        throw new Error('Invalid JSON format. Expected "nodes" and "edges" arrays.');
                    }

                    this.processData(data);
                    this.render();
                    document.getElementById('loading').style.display = 'none';

                } catch (error) {
                    document.getElementById('loading').style.display = 'none';
                    this.showError(`Error loading file: ${error.message}`);
                    console.error('Error:', error);
                }
            }

            processData(data) {
                this.data = data;

                // Create a Set of valid node IDs for efficient lookup
                const validNodeIds = new Set(data.nodes.map(node => node.id));

                // Filter out edges that reference non-existent nodes
                const originalEdgeCount = data.edges.length;

                this.data.edges = data.edges.filter(edge => {
                    const sourceValid = validNodeIds.has(edge.source);
                    const destValid = validNodeIds.has(edge.destination);

                    if (!sourceValid || !destValid) {
                        console.warn('Filtered out invalid edge:', {
                            source: edge.source,
                            sourceValid,
                            destination: edge.destination,
                            destValid
                        });
                        return false;
                    }
                    return true;
                });

                const filteredEdgeCount = this.data.edges.length;
                if (filteredEdgeCount < originalEdgeCount) {
                    console.log(`Filtered ${originalEdgeCount - filteredEdgeCount} invalid edges`);
                }

                // Update stats
                document.getElementById('nodeCount').textContent = data.nodes.length;
                document.getElementById('edgeCount').textContent = filteredEdgeCount;

                // Create color scale based on plugin types
                const plugins = [...new Set(data.nodes.map(n => n.plugin))];
                this.colorScale = d3.scaleOrdinal()
                    .domain(plugins)
                    .range(d3.schemeCategory10);

                this.createLegend(plugins);
            }

            render() {
                // Clear previous visualization
                this.g.selectAll('*').remove();

                const width = document.getElementById('visualization').clientWidth;
                const height = document.getElementById('visualization').clientHeight;

                // Convert edges to D3 format (destination -> target)
                const links = this.data.edges.map(edge => ({
                    source: edge.source,
                    target: edge.destination,  // Map destination to target for D3
                    relation: edge.relation
                }));

                // Create force simulation
                this.simulation = d3.forceSimulation(this.data.nodes)
                    .force('link', d3.forceLink(links)
                        .id(d => d.id)
                        .distance(100))
                    .force('charge', d3.forceManyBody().strength(-300))
                    .force('center', d3.forceCenter(width / 2, height / 2))
                    .force('collision', d3.forceCollide().radius(30));

                // Create links
                const link = this.g.append('g')
                    .selectAll('path')
                    .data(links)
                    .enter().append('path')
                    .attr('class', 'link')
                    .attr('marker-end', 'url(#arrowhead)');

                // Add arrow marker
                this.svg.append('defs').append('marker')
                    .attr('id', 'arrowhead')
                    .attr('viewBox', '-0 -5 10 10')
                    .attr('refX', 25)
                    .attr('refY', 0)
                    .attr('orient', 'auto')
                    .attr('markerWidth', 6)
                    .attr('markerHeight', 6)
                    .append('svg:path')
                    .attr('d', 'M 0,-5 L 10 ,0 L 0,5')
                    .attr('fill', '#999');

                // Create link labels
                const linkLabel = this.g.append('g')
                    .selectAll('text')
                    .data(links)
                    .enter().append('text')
                    .attr('class', 'link-label')
                    .text(d => d.relation);

                // Create nodes
                const node = this.g.append('g')
                    .selectAll('g')
                    .data(this.data.nodes)
                    .enter().append('g')
                    .attr('class', 'node')
                    .call(this.drag());

                node.append('circle')
                    .attr('r', 8)
                    .attr('fill', d => this.colorScale(d.plugin));

                node.append('text')
                    .attr('dx', 12)
                    .attr('dy', 4)
                    .text(d => d.label);

                node.on('mouseover', (event, d) => this.showTooltip(event, d))
                    .on('mouseout', () => this.hideTooltip());

                // Update positions on each tick
                this.simulation.on('tick', () => {
                    link.attr('d', d => {
                        const dx = d.target.x - d.source.x;
                        const dy = d.target.y - d.source.y;
                        const dr = Math.sqrt(dx * dx + dy * dy);
                        return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
                    });

                    linkLabel
                        .attr('x', d => (d.source.x + d.target.x) / 2)
                        .attr('y', d => (d.source.y + d.target.y) / 2);

                    node.attr('transform', d => `translate(${d.x},${d.y})`);
                });
            }

            createLegend(plugins) {
                // Remove existing legend
                d3.select('.legend').remove();

                const legend = d3.select('#visualization')
                    .append('div')
                    .attr('class', 'legend');

                // Legend header (clickable to toggle)
                const header = legend.append('div')
                    .attr('class', 'legend-header')
                    .on('click', () => {
                        const content = legend.select('.legend-content');
                        const toggle = legend.select('.legend-toggle');
                        const isShowing = content.classed('show');
                        content.classed('show', !isShowing);
                        toggle.classed('collapsed', isShowing);
                    });

                header.append('div')
                    .attr('class', 'legend-title')
                    .text('Plugin Types');

                header.append('div')
                    .attr('class', 'legend-toggle')
                    .text('▼');

                // Legend content
                const content = legend.append('div')
                    .attr('class', 'legend-content show');

                plugins.forEach(plugin => {
                    const item = content.append('div')
                        .attr('class', 'legend-item');

                    item.append('div')
                        .attr('class', 'legend-color')
                        .style('background-color', this.colorScale(plugin));

                    item.append('div')
                        .attr('class', 'legend-label')
                        .text(plugin);
                });
            }

            showTooltip(event, d) {
                const tooltip = this.tooltip;
                tooltip.classed('show', true)
                    .html(`
                        <div class="tooltip-title">${d.label}</div>
                        <div class="tooltip-content">
                            <div class="tooltip-row">
                                <span class="tooltip-label">ID:</span>
                                <span>${d.id}</span>
                            </div>
                            <div class="tooltip-row">
                                <span class="tooltip-label">Plugin:</span>
                                <span>${d.plugin}</span>
                            </div>
                            <div class="tooltip-row">
                                <span class="tooltip-label">Host:</span>
                                <span>${d.entityId.host}</span>
                            </div>
                        </div>
                    `)
                    .style('left', (event.pageX + 10) + 'px')
                    .style('top', (event.pageY - 10) + 'px');
            }

            hideTooltip() {
                this.tooltip.classed('show', false);
            }

            drag() {
                function dragstarted(event, d) {
                    if (!event.active) this.simulation.alphaTarget(0.3).restart();
                    d.fx = d.x;
                    d.fy = d.y;
                }

                function dragged(event, d) {
                    d.fx = event.x;
                    d.fy = event.y;
                }

                function dragended(event, d) {
                    if (!event.active) this.simulation.alphaTarget(0);
                    d.fx = null;
                    d.fy = null;
                }

                return d3.drag()
                    .on('start', dragstarted.bind(this))
                    .on('drag', dragged.bind(this))
                    .on('end', dragended.bind(this));
            }

            handleSearch(searchTerm) {
                if (!this.data) return;

                searchTerm = searchTerm.toLowerCase().trim();

                const matchedNodes = [];

                // Reset all nodes and links
                this.g.selectAll('.node')
                    .classed('highlighted', false)
                    .classed('dimmed', false)
                    .each(function(d) {
                        const matches = !searchTerm ||
                            d.label.toLowerCase().includes(searchTerm) ||
                            d.id.toLowerCase().includes(searchTerm) ||
                            d.plugin.toLowerCase().includes(searchTerm);

                        if (matches && searchTerm) {
                            matchedNodes.push(d);
                        }
                    });

                if (searchTerm) {
                    // Highlight matched nodes and dim others
                    this.g.selectAll('.node')
                        .classed('highlighted', d => matchedNodes.includes(d))
                        .classed('dimmed', d => !matchedNodes.includes(d));

                    // Dim links that don't connect to matched nodes
                    this.g.selectAll('.link')
                        .style('opacity', d => {
                            const sourceMatches = matchedNodes.some(n => n.id === d.source.id);
                            const targetMatches = matchedNodes.some(n => n.id === d.target.id);
                            return (sourceMatches || targetMatches) ? 0.6 : 0.1;
                        });

                    // Center on first matched node
                    if (matchedNodes.length > 0) {
                        this.centerOnNode(matchedNodes[0]);
                    }
                }
            }

            centerOnNode(node) {
                if (!node) return;

                const width = document.getElementById('visualization').clientWidth;
                const height = document.getElementById('visualization').clientHeight;

                const scale = 1.5;
                const x = -node.x * scale + width / 2;
                const y = -node.y * scale + height / 2;

                this.svg.transition()
                    .duration(750)
                    .call(this.zoom.transform, d3.zoomIdentity.translate(x, y).scale(scale));
            }

            toggleJsonPanel() {
                const panel = document.getElementById('jsonPanel');
                const isShowing = panel.classList.contains('show');

                if (isShowing) {
                    panel.classList.remove('show');
                } else {
                    panel.classList.add('show');
                    const displayElement = document.getElementById('jsonDisplay');

                    // Show JSON data
                    if (this.data) {
                        setTimeout(() => {
                            try {
                                const jsonString = JSON.stringify(this.data, null, 2);
                                displayElement.textContent = jsonString;
                            } catch (error) {
                                displayElement.textContent = 'Error displaying JSON: ' + error.message;
                            }
                        }, 100);
                    }
                }
            }

            resetView() {
                if (!this.svg) return;

                const width = document.getElementById('visualization').clientWidth;
                const height = document.getElementById('visualization').clientHeight;

                this.svg.transition()
                    .duration(750)
                    .call(this.zoom.transform, d3.zoomIdentity);

                // Reset search
                document.getElementById('searchInput').value = '';
                this.g.selectAll('.node')
                    .classed('highlighted', false)
                    .classed('dimmed', false);
                this.g.selectAll('.link')
                    .style('opacity', 0.6);
            }

            clear() {
                this.data = null;
                this.g.selectAll('*').remove();
                d3.select('.legend').remove();
                document.getElementById('nodeCount').textContent = '0';
                document.getElementById('edgeCount').textContent = '0';
                document.getElementById('searchInput').value = '';
                document.getElementById('fileInput').value = '';
                document.getElementById('jsonDisplay').textContent = '';
                document.getElementById('jsonPanel').classList.remove('show');
            }

            showError(message) {
                const viz = document.getElementById('visualization');
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = message;
                viz.appendChild(errorDiv);

                setTimeout(() => {
                    errorDiv.remove();
                }, 5000);
            }
        }

        // Initialize visualization
        const viz = new TopologyVisualization();
    </script>
</body>
</html>
